<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuildTrack - Login</title>

  <style>

    body {
      margin: 0;
      padding: 0;
      background-color: #f0f4f8;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background-color: white;
      padding: 40px;
      border-radius: 12px;
      width: 380px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    h1 {
      color: #1a3a5c;
      font-size: 26px;
      margin-bottom: 6px;
    }

    p {
      color: #888;
      font-size: 14px;
      margin-bottom: 24px;
    }

    label {
      font-size: 13px;
      color: #444;
      display: block;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 18px;
      box-sizing: border-box;
      outline: none;
    }

    input:focus {
      border-color: #1a3a5c;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #1a3a5c;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background-color: #1d6a5c;
    }

    .forgot {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: #1a3a5c;
      cursor: pointer;
    }

    .register-link {
      text-align: center;
      margin-top: 12px;
      font-size: 13px;
      color: #888;
    }

    .register-link a {
      color: #1a3a5c;
      font-weight: bold;
      text-decoration: none;
    }

  </style>

</head>

<body>

  <div class="login-box">

    <h1>Welcome to BuildTrack</h1>
    <p>Sign in to your account</p>

    <form>

      <label>Email Address</label>
      <input type="email" placeholder="Enter your email">

      <label>Password</label>
      <input type="password" placeholder="Enter your password">

      <button type="submit">Login</button>

    </form>

    <p class="forgot">Forgot password?</p>

    <p class="register-link">
      Don't have an account?
      <a href="register.html">Register here</a>
    </p>

  </div>

</body>

</html>
