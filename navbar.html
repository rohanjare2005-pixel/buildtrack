<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuildTrack - Dashboard</title>

  <style>

    /* Reset default browser styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f0f4f8;
    }

    /* Navigation bar */
    .navbar {
      background-color: #1a3a5c;
      padding: 0 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 60px;
    }

    /* Logo on left side */
    .navbar-logo {
      color: white;
      font-size: 20px;
      font-weight: bold;
      text-decoration: none;
    }

    /* Menu links on right side */
    .navbar-links {
      display: flex;
      gap: 24px;
      list-style: none;
    }

    .navbar-links a {
      color: rgba(255, 255, 255, 0.8);
      text-decoration: none;
      font-size: 14px;
    }

    /* Link when mouse hovers */
    .navbar-links a:hover {
      color: white;
    }

    /* Active link - current page */
    .navbar-links a.active {
      color: white;
      border-bottom: 2px solid #1d9e75;
      padding-bottom: 4px;
    }

    /* Logout button */
    .logout-btn {
      background-color: #e24b4a;
      color: white !important;
      padding: 7px 16px;
      border-radius: 6px;
      font-size: 13px;
    }

    .logout-btn:hover {
      background-color: #c73a39 !important;
    }

    /* Page content below navbar */
    .page-content {
      padding: 30px;
    }

    .page-content h2 {
      font-size: 22px;
      color: #1a3a5c;
      margin-bottom: 8px;
    }

    .page-content p {
      color: #888;
      font-size: 14px;
    }

  </style>

</head>

<body>

  <!-- Navigation Bar -->
  <nav class="navbar">

    <!-- Logo -->
    <a href="#" class="navbar-logo">🏗️ BuildTrack</a>

    <!-- Menu Links -->
    <ul class="navbar-links">
      <li><a href="#" class="active">Dashboard</a></li>
      <li><a href="#">Projects</a></li>
      <li><a href="#">Workers</a></li>
      <li><a href="#">Inventory</a></li>
      <li><a href="#">Reports</a></li>
      <li><a href="#" class="logout-btn">Logout</a></li>
    </ul>

  </nav>

  <!-- Page Content -->
  <div class="page-content">
    <h2>Welcome back, Project Manager! 👋</h2>
    <p>Here is your BuildTrack dashboard overview.</p>
  </div>

</body>

</html>
